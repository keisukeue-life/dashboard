name: Sync Issues to Notion

on:
  issues:
    types: [opened, edited, closed, reopened, labeled]

jobs:
  sync-to-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Sync issue to Notion
        uses: actions/github-script@v7
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_DATABASE_ID: "33a361e14d07801e8e8be01bee27f283"
        with:
          script: |
            const issue = context.payload.issue;
            const org = context.repo.owner;
            const notionToken = process.env.NOTION_TOKEN;
            const databaseId = process.env.NOTION_DATABASE_ID;

            if (!notionToken) {
              core.setFailed('NOTION_API_TOKEN secret is not set');
              return;
            }

            // First, get database schema to know property names
            const dbRes = await fetch(`https://api.notion.com/v1/databases/${databaseId}`, {
              headers: {
                'Authorization': `Bearer ${notionToken}`,
                'Notion-Version': '2022-06-28'
              }
            });
            const dbData = await dbRes.json();
            const props = dbData.properties || {};

            // Find the title property name (could be "Name", "名前", "Title", etc.)
            let titleProp = 'Name';
            for (const [key, val] of Object.entries(props)) {
              if (val.type === 'title') { titleProp = key; break; }
            }

            // Find or note which properties exist
            const hasStatus = 'Status' in props || 'ステータス' in props;
            const statusKey = 'Status' in props ? 'Status' : 'ステータス' in props ? 'ステータス' : null;

            // Build properties using only the title (guaranteed to exist)
            const properties = {};
            properties[titleProp] = {
              title: [{ text: { content: `[${org}] ${issue.title}` } }]
            };

            // Add status if it exists
            if (statusKey) {
              let status = 'Not started';
              if (issue.state === 'closed') status = 'Done';
              else if (issue.labels && issue.labels.some(l => l.name === 'in-progress')) status = 'In progress';
              properties[statusKey] = { status: { name: status } };
            }

            // Search for existing page
            const searchRes = await fetch(`https://api.notion.com/v1/databases/${databaseId}/query`, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${notionToken}`,
                'Notion-Version': '2022-06-28',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                filter: {
                  property: titleProp,
                  title: { contains: issue.html_url }
                }
              })
            });
            const searchData = await searchRes.json();
            const existingPage = searchData.results && searchData.results.length > 0
              ? searchData.results[0] : null;

            // Build page content with issue details
            const children = [
              {
                object: 'block',
                type: 'heading_2',
                heading_2: {
                  rich_text: [{ text: { content: 'Details' } }]
                }
              },
              {
                object: 'block',
                type: 'paragraph',
                paragraph: {
                  rich_text: [{ text: { content: `Organization: ${org}` } }]
                }
              },
              {
                object: 'block',
                type: 'paragraph',
                paragraph: {
                  rich_text: [
                    { text: { content: 'GitHub: ' } },
                    { text: { content: issue.html_url, link: { url: issue.html_url } } }
                  ]
                }
              },
              {
                object: 'block',
                type: 'paragraph',
                paragraph: {
                  rich_text: [{ text: { content: issue.body || '(No description)' } }]
                }
              }
            ];

            if (issue.labels && issue.labels.length > 0) {
              children.push({
                object: 'block',
                type: 'paragraph',
                paragraph: {
                  rich_text: [{ text: { content: `Labels: ${issue.labels.map(l => l.name).join(', ')}` } }]
                }
              });
            }

            if (existingPage) {
              const updateRes = await fetch(`https://api.notion.com/v1/pages/${existingPage.id}`, {
                method: 'PATCH',
                headers: {
                  'Authorization': `Bearer ${notionToken}`,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({ properties })
              });
              console.log(`Updated Notion page for: ${issue.title}`);
            } else {
              const createRes = await fetch(`https://api.notion.com/v1/pages`, {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${notionToken}`,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  parent: { database_id: databaseId },
                  properties,
                  children
                })
              });
              const createData = await createRes.json();
              if (createData.id) {
                console.log(`Created Notion page for: ${issue.title}`);
              } else {
                console.log('Notion API response:', JSON.stringify(createData));
                core.setFailed('Failed to create Notion page');
              }
            }
